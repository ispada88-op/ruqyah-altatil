name: roqia_altatil
description: "Roqia Al-Ta'til is a serene Islamic app designed to bring tranquility to your daily life, offering written and audio Roqia, along with a daily Dhikr counter in a beautifully minimalist interface."
publish_to: "none"
version: 1.0.3+5

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  provider: ^6.1.2
  go_router: ^16.2.0
  just_audio: ^0.10.5
  just_audio_background: ^0.0.1-beta.13   # background playback (lock screen + notification)
  audio_session: ^0.2.2
  wakelock_plus: ^1.2.8
  shared_preferences: ^2.0.0
  shimmer: ^3.0.0
  flutter_animate: ^4.0.0
  cached_network_image: ^3.0.0
  url_launcher: ^6.0.0
  mailer: ^7.0.0

  # ── Notifications (dhikr reminders) ──
  flutter_local_notifications: ^17.2.0
  timezone: ^0.9.4
  permission_handler: ^11.3.0

  # ── New features ──
  share_plus: ^10.1.2          # share verses
  in_app_review: ^2.0.10       # in-app rating

  # ── credit_card module (dormant) ──
  drift: ^2.32.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.0
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1   # native splash screen
  drift_dev: ^2.32.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/audio/

flutter_launcher_icons:
  android: true
  ios: false   # keep iOS icons untouched (app already on App Store)
  image_path: assets/icons/app_icon.png
  adaptive_icon_background: "#5E6B45"
  adaptive_icon_foreground: assets/icons/app_icon_fg.png
  min_sdk_android: 23
  web:
    generate: false

flutter_native_splash:
  color: "#006B6B"
  image: assets/icons/dreamflow_icon.jpg
  android_12:
    color: "#006B6B"
    image: assets/icons/dreamflow_icon.jpg
  ios: true
  android: true
  fullscreen: false
