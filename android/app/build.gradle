plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}
def useLocalSigning = keystorePropertiesFile.exists()

android {
    namespace = "com.ruqyah.altatil"
    // EXPLICIT SDK versions to satisfy Google Play's August 2025 mandate (target 35).
    // Don't rely on flutter.compileSdkVersion — it depends on the local Flutter SDK
    // version on the build machine, and Codemagic stable lags behind.
    compileSdk = 35
    ndkVersion = "27.0.12077973"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17.toString()
    }

    signingConfigs {
       release {
           if (useLocalSigning) {
               keyAlias keystoreProperties['keyAlias']
               keyPassword keystoreProperties['keyPassword']
               storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
               storePassword keystoreProperties['storePassword']
           }
       }
    }

    defaultConfig {
        applicationId = "com.ruqyah.altatil"
        minSdkVersion = 23
        targetSdk = 35
        versionCode = flutter.versionCode
        versionName = flutter.versionName

        // Multidex for safety (large dep tree with drift + just_audio + google_fonts)
        multiDexEnabled = true
    }

    buildTypes {
        release {
            signingConfig = useLocalSigning ? signingConfigs.release : signingConfigs.debug
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    // Generate per-ABI APKs for external distribution (Play uses AAB so this only helps APK)
    splits {
        abi {
            enable project.hasProperty('splitPerAbi')
            reset()
            include 'arm64-v8a', 'armeabi-v7a', 'x86_64'
            universalApk false
        }
    }

    // Bundle config: per-density + per-language splits keep AAB small on Play
    bundle {
        density { enableSplit true }
        abi     { enableSplit true }
        language { enableSplit true }
    }
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.4'
}

flutter {
    source = "../.."
}
