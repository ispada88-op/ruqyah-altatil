# Codemagic CI/CD — Roqia Al-Tatil
# iOS (App Store) | Android (Google Play) | Windows
# https://docs.codemagic.io/yaml-quick-start/building-a-flutter-app
#
# إعداد مسبق في Codemagic:
# - iOS: ربط Apple Developer + App Store Connect API
# - Android: رفع keystore باسم android_keystore
# - Windows: يُبنى محلياً أو عبر workflow منفصل

workflows:
  ios-app-store:
    name: iOS App Store
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Install CocoaPods
        script: |
          cd ios && pod install && cd ..
      - name: Build iOS
        script: flutter build ipa --release
    artifacts:
      - build/ios/ipa/*.ipa
    # تفعيل النشر بعد ربط App Store Connect في Codemagic
    # publishing:
    #   app_store_connect:
    #     api_key: $APP_STORE_CONNECT_KEY_ID
    #     key_id: $APP_STORE_CONNECT_KEY_ID
    #     issuer_id: $APP_STORE_CONNECT_ISSUER_ID
    #     submit_to_testflight: true

  android-google-play:
    name: Android Google Play
    max_build_duration: 45
    instance_type: linux_x2
    environment:
      flutter: stable
      android_signing:
        - android_keystore
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build Android App Bundle
        script: flutter build appbundle --release
    artifacts:
      - build/app/outputs/bundle/release/*.aab
    # تفعيل النشر بعد ربط Google Play في Codemagic
    # publishing:
    #   google_play:
    #     credentials: $GOOGLE_PLAY_CREDENTIALS
    #     track: internal

  # Windows: يُبنى محلياً على جهاز Windows
  # flutter build windows --release
  # المخرجات في: build/windows/x64/runner/Release/
