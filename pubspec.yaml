name: roqia_altatil
description: "Roqia Al-Ta'til is a serene Islamic app designed to bring tranquility to your daily life, offering written and audio Roqia, along with a daily Dhikr counter in a beautifully minimalist interface."
publish_to: "none"
version: 1.0.1+3

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  provider: ^6.1.2
  go_router: ^16.2.0

  # ────────── Audio stack ──────────
  just_audio: ^0.10.5
  just_audio_background: ^0.0.1-beta.13
  audio_session: ^0.2.2
  wakelock_plus: ^1.2.8

  # ────────── Storage ──────────
  shared_preferences: ^2.0.0

  # ────────── UI helpers ──────────
  shimmer: ^3.0.0
  flutter_animate: ^4.0.0
  cached_network_image: ^3.0.0
  url_launcher: ^6.0.0

  # ────────── Notifications ──────────
  flutter_local_notifications: ^17.2.0
  timezone: ^0.9.4
  permission_handler: ^11.3.0

  # ────────── Sharing & review ──────────
  share_plus: ^10.1.2
  in_app_review: ^2.0.10

  # Kept for future credit_card module
  drift: ^2.32.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.0
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1
  drift_dev: ^2.32.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/audio/

# ═══════════════════════════════════════════════════════════════════
# Launcher Icons - Adaptive + Monochrome (Android 8+/12+/13+)
# ═══════════════════════════════════════════════════════════════════
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icons/app_icon.png"          # 1024×1024 PNG (المصدر)
  min_sdk_android: 23
  remove_alpha_ios: true

  # Adaptive icon (Android 8+)
  adaptive_icon_background: "#006B6B"               # Teal خلفية
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"  # PNG شفاف 432×432

  # Monochrome icon (Android 13+ Themed Icons)
  adaptive_icon_monochrome: "assets/icons/app_icon_monochrome.png"  # PNG أحادي اللون

  web:
    generate: false

# ═══════════════════════════════════════════════════════════════════
# Native Splash Screen
# ═══════════════════════════════════════════════════════════════════
flutter_native_splash:
  color: "#006B6B"
  image: assets/icons/splash_icon.png              # 480×480 PNG (يمكن نفس app_icon)
  android_12:
    color: "#006B6B"
    image: assets/icons/splash_icon.png
  ios: true
  android: true
  fullscreen: false
  android_gravity: center
  ios_content_mode: center
