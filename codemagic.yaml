# بناء تطبيق iOS من السحابة (بدون Mac) — رقية التعطيل
# بعد رفع المشروع على GitHub/GitLab: اربط المستودع في codemagic.io وأضف تكامل App Store Connect

workflows:
  ios-ruqyah:
    name: iOS رقية التعطيل
    instance_type: mac_mini_m2
    max_build_duration: 120
    integrations:
      app_store_connect: codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.ruqyah.altatil
      vars:
        FLUTTER_BUILD_NAME: "1.0.0"
        FLUTTER_BUILD_NUMBER: "1"
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Get Flutter packages
        script: flutter pub get
      - name: Generate icons and splash
        script: |
          dart run flutter_launcher_icons
          dart run flutter_native_splash:create
      - name: Install CocoaPods
        script: find . -name "Podfile" -execdir pod install \;
      - name: Flutter analyze
        script: flutter analyze
        ignore_failure: true
      - name: Build IPA
        script: |
          flutter build ipa --release \
            --build-name="$FLUTTER_BUILD_NAME" \
            --build-number="$FLUTTER_BUILD_NUMBER"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - ispada88@gmail.com
        notify:
          success: true
          failure: true
