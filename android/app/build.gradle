plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}
def useLocalSigning = keystorePropertiesFile.exists()

android {
    namespace = "com.ruqyah.altatil"
    // Hardcoded to satisfy Google Play 2025 target API mandate (35),
    // independent of the local Flutter SDK's flutter.compileSdkVersion.
    compileSdk = 35
    ndkVersion = "27.0.12077973"

    compileOptions {
        // Required by flutter_local_notifications (Java 8+ time APIs)
        coreLibraryDesugaringEnabled = true
        sourceCompatibility = JavaVersion.VERSION_11
        targetCompatibility = JavaVersion.VERSION_11
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_11
    }

    signingConfigs {
       release {
           if (useLocalSigning) {
               keyAlias = keystoreProperties['keyAlias']
               keyPassword = keystoreProperties['keyPassword']
               storeFile = keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
               storePassword = keystoreProperties['storePassword']
           }
       }
    }

    defaultConfig {
        applicationId = "com.ruqyah.altatil"
        minSdkVersion = flutter.minSdkVersion
        targetSdk = 35
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    buildTypes {
        release {
            signingConfig = useLocalSigning ? signingConfigs.release : signingConfigs.debug
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.1.4"
}
